<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>I love you 💖</title>

  <style>
    :root{
      --pink:#ff5fd2;
      --pink2:#ff1fb8;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#000;
      overflow:hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .stage{
      width:min(680px, 94vw);
      height:min(680px, 94vw);
      position:relative;
      perspective: 900px;
      /* 🔥 ESSENCIAL pro dedo funcionar */
      touch-action: none;
      user-select:none;
    }

    .tilt{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
      will-change: transform;
    }

    .word{
      position:absolute;
      left:0;
      top:0;
      white-space:nowrap;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--pink);
      text-shadow:
        0 0 6px rgba(255,255,255,.85),
        0 0 14px rgba(255,120,210,.75),
        0 0 28px rgba(255,40,180,.55);
      opacity:.95;

      /* ✅ centraliza no ponto e NÃO gira a frase (pra ficar legível) */
      transform: translate(-50%, -50%);
    }

    /* leve vinheta */
    .vignette{
      position:fixed;
      inset:0;
      pointer-events:none;
      background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0) 45%, rgba(0,0,0,.65) 82%, rgba(0,0,0,.92) 100%);
    }
  </style>
</head>

<body>
  <div class="stage" id="stage" aria-label="Coração interativo com I love you">
    <div class="tilt" id="tilt"></div>
  </div>
  <div class="vignette"></div>

  <script>
    const stage = document.getElementById("stage");
    const tilt  = document.getElementById("tilt");

    const TEXT = "I love you";
    const COUNT = 90;     // ✅ menos palavras = mais legível
    const SIZE  = 260;    // tamanho do coração
    const OFFSET = 0.34;  // ✅ espaçamento extra entre frases (0.25–0.55)

    function heartEq(t){
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
      return {x,y};
    }

    function render(){
      tilt.innerHTML = "";
      const r = stage.getBoundingClientRect();
      const cx = r.width/2;
      const cy = r.height/2;

      // usa um passo maior (por causa do OFFSET) pra não sobrepor texto
      const step = (Math.PI * 2) / (COUNT * (1 - Math.min(0.8, OFFSET)));

      for(let i=0;i<COUNT;i++){
        const t = i * step;

        const p = heartEq(t);
        const x = cx + p.x * (SIZE/32);
        const y = cy - p.y * (SIZE/32);

        const s = document.createElement("span");
        s.className = "word";
        s.textContent = TEXT;
        s.style.left = `${x}px`;
        s.style.top  = `${y}px`;

        tilt.appendChild(s);
      }
    }

    render();
    window.addEventListener("resize", render);

    // ===== Interação (funciona em mouse e dedo) =====
    let targetRX = 0, targetRY = 0;
    let curRX = 0, curRY = 0;

    function setTarget(clientX, clientY){
      const r = stage.getBoundingClientRect();
      const nx = (clientX - (r.left + r.width/2)) / (r.width/2);   // -1..1
      const ny = (clientY - (r.top  + r.height/2)) / (r.height/2); // -1..1

      targetRY = Math.max(-1, Math.min(1, nx)) * 18;  // rotateY
      targetRX = Math.max(-1, Math.min(1, ny)) * -14; // rotateX
    }

    // ✅ pointer events = mouse + touch
    stage.addEventListener("pointerdown", (e) => {
      stage.setPointerCapture(e.pointerId);
      setTarget(e.clientX, e.clientY);
    });

    stage.addEventListener("pointermove", (e) => {
      setTarget(e.clientX, e.clientY);
    });

    function animate(){
      curRX += (targetRX - curRX) * 0.12;
      curRY += (targetRY - curRY) * 0.12;

      tilt.style.transform = `rotateX(${curRX}deg) rotateY(${curRY}deg)`;
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
