<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>I love you 💖 (Interactive)</title>

  <style>
    :root{
      --bg:#000;
      --pink:#ff86cf;
      --pink2:#ff3fb7;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(900px 600px at 50% 35%, #140012 0%, var(--bg) 55%, #000 100%);
      overflow:hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .stage{
      position:relative;
      width:min(640px, 94vw);
      height:min(640px, 94vw);
      transform: translateZ(0);
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:10%;
      background: radial-gradient(circle at 50% 50%, rgba(255,110,210,.22), transparent 62%);
      filter: blur(16px);
      opacity:1;
      pointer-events:none;
    }

    /* a gente controla essa transformação via JS (mouse) */
    .tilt{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
      will-change: transform;
    }

    .trail, .heart{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
    }

    .trail{
      filter: blur(1.6px);
      opacity:.30;
      mix-blend-mode: screen;
    }

    .love{
      position:absolute;
      left:0;
      top:0;
      color: var(--pink);
      font-size: clamp(14px, 2.1vw, 18px);
      letter-spacing: 2px;
      white-space: nowrap;
      user-select:none;
      text-rendering: geometricPrecision;

      text-shadow:
        0 0 4px rgba(255,255,255,.85),
        0 0 10px rgba(255,145,225,.75),
        0 0 18px rgba(255,90,200,.65),
        0 0 34px rgba(255,60,185,.55);

      /* bem leve, só pra dar “vida” sem atrapalhar leitura */
      animation: breathe 2.8s ease-in-out infinite;
      will-change: transform, opacity, filter;
    }

    @keyframes breathe{
      0%,100%{ filter: brightness(1) saturate(1.1); }
      50%{ filter: brightness(1.12) saturate(1.25); }
    }

    .vignette{
      position:fixed;
      inset:-2px;
      background: radial-gradient(circle at 50% 45%, transparent 42%, rgba(0,0,0,.55) 78%, rgba(0,0,0,.90) 100%);
      pointer-events:none;
    }

    .hint{
      position:fixed;
      bottom:14px;
      left:50%;
      transform:translateX(-50%);
      color: rgba(255,255,255,.65);
      font-size:12px;
      letter-spacing: .5px;
      user-select:none;
    }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <div class="tilt" id="tilt">
      <div class="trail" id="trail"></div>
      <div class="heart" id="heart"></div>
    </div>
  </div>

  <div class="vignette"></div>
  <div class="hint">mexe o mouse (ou dedo) 💖</div>

  <script>
    const TEXT = "I love you";
    const COUNT = 140;        // menos pontos = mais legível
    const SIZE = 250;         // tamanho do coração
    const DEPTH = 10;         // baixa profundidade = mais leitura
    const JITTER = 0.6;       // pouco jitter = mais limpo
    const FOLLOW = 0.10;      // suavidade do follow
    const AUTO_SPIN = 0.003;  // rotação beeem leve automática

    const stage = document.getElementById("stage");
    const tiltEl = document.getElementById("tilt");
    const heart = document.getElementById("heart");
    const trail = document.getElementById("trail");

    function heartPoint(t){
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
      return { x, y };
    }

    function build(container, opacityMul){
      container.innerHTML = "";
      const rect = stage.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;

      for(let i=0;i<COUNT;i++){
        const t = (i / COUNT) * Math.PI * 2;
        const p = heartPoint(t);

        let x = cx + (p.x * (SIZE/32));
        let y = cy - (p.y * (SIZE/32));

        x += Math.sin(i*1.7) * JITTER;
        y += Math.cos(i*1.3) * JITTER;

        const z = Math.sin(t*2) * DEPTH;

        // ✅ Orienta as palavras no caminho, mas mantém “de pé” pra ler
        const t2 = t + 0.001;
        const p2 = heartPoint(t2);
        const dx = (p2.x - p.x);
        const dy = (p2.y - p.y);

        // tangente
        let angle = Math.atan2(-dy, dx) * (180/Math.PI);

        // limita a rotação pra não ficar de cabeça pra baixo (melhora leitura)
        if (angle > 90) angle -= 180;
        if (angle < -90) angle += 180;

        const s = document.createElement("span");
        s.className = "love";
        s.textContent = TEXT;

        // posição via CSS vars (centraliza com translate -50%)
        s.style.setProperty("--x", `${x}px`);
        s.style.setProperty("--y", `${y}px`);
        s.style.setProperty("--z", `${z}px`);

        // transform direto (sem pulse que bagunça leitura)
        s.style.transform =
          `translate3d(${x}px, ${y}px, ${z}px) translate(-50%, -50%) rotate(${angle}deg)`;

        // opacidade suave (trail)
        const base = 0.55 + 0.45 * Math.abs(Math.cos(t));
        s.style.opacity = String(Math.min(1, base * opacityMul));

        container.appendChild(s);
      }
    }

    // cria as camadas
    function render(){
      build(heart, 1);
      build(trail, 0.7);
    }
    render();
    window.addEventListener("resize", render);

    // ====== Interação (segue mouse/dedo) ======
    let targetX = 0, targetY = 0;
    let curX = 0, curY = 0;
    let spin = 0;

    function setTargetFromClient(clientX, clientY){
      const r = stage.getBoundingClientRect();
      const nx = (clientX - (r.left + r.width/2)) / (r.width/2);   // -1..1
      const ny = (clientY - (r.top  + r.height/2)) / (r.height/2); // -1..1
      targetX = Math.max(-1, Math.min(1, nx));
      targetY = Math.max(-1, Math.min(1, ny));
    }

    window.addEventListener("mousemove", (e) => setTargetFromClient(e.clientX, e.clientY), {passive:true});
    window.addEventListener("touchmove", (e) => {
      if(!e.touches?.length) return;
      setTargetFromClient(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive:true});

    function animate(){
      curX += (targetX - curX) * FOLLOW;
      curY += (targetY - curY) * FOLLOW;

      // inclinação baseada no mouse (bem smooth)
      const rotY = curX * 22;      // esquerda/direita
      const rotX = -curY * 18;     // cima/baixo

      spin += AUTO_SPIN;
      const rotZ = spin * 180/Math.PI;

      tiltEl.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;

      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
    window.addEventListener("resize", render);
  </script>
</body>
</html>
