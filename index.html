<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Heart Neon 💖</title>

  <style>
    :root{
      --bg:#000;
      --pink:#ff86cf;
      --pink2:#ff3fb7;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(900px 600px at 50% 35%, #140012 0%, var(--bg) 55%, #000 100%);
      overflow:hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .stage{
      position:relative;
      width:min(560px, 92vw);
      height:min(560px, 92vw);
      filter:saturate(1.15);
      transform:translateZ(0);
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:10%;
      background: radial-gradient(circle at 50% 50%, rgba(255,110,210,.25), transparent 60%);
      filter: blur(14px);
      opacity:.9;
      pointer-events:none;
    }

    /* ✅ FIX: agora spin + float NÃO brigam (um fica no wrapper, outro no inner) */
    .spinWrap{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
      animation: spin 9s linear infinite;
      will-change: transform;
    }
    .floatInner{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
      animation: floaty 3.5s ease-in-out infinite;
      will-change: transform;
    }

    .trail{
      position:absolute;
      inset:0;
      filter: blur(1.7px);
      opacity:.35;
      mix-blend-mode: screen;
      transform-style:preserve-3d;
    }

    .heart{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
    }

    .love{
      position:absolute;
      left:0;
      top:0;
      color: var(--pink);
      font-size: clamp(13px, 2.2vw, 18px);
      letter-spacing: 2px;
      white-space: nowrap;
      user-select:none;
      text-rendering: geometricPrecision;

      text-shadow:
        0 0 4px rgba(255,255,255,.85),
        0 0 10px rgba(255,145,225,.75),
        0 0 18px rgba(255,90,200,.65),
        0 0 34px rgba(255,60,185,.55);

      animation:
        pulse 2.4s ease-in-out infinite,
        shimmer 6s linear infinite;
      will-change: transform, opacity, filter;
    }

    @keyframes spin{
      0%   { transform: rotateZ(0deg) rotateX(16deg) rotateY(-10deg); }
      100% { transform: rotateZ(360deg) rotateX(16deg) rotateY(-10deg); }
    }

    @keyframes floaty{
      0%,100% { transform: translateY(-7px) scale(1); }
      50%     { transform: translateY(9px) scale(1.01); }
    }

    /* ✅ FIX: inclui translate(-50%, -50%) pra centralizar cada palavra no ponto */
    @keyframes pulse{
      0%,100% {
        transform:
          translate3d(var(--x), var(--y), var(--z))
          translate(-50%, -50%)
          rotate(var(--r))
          scale(.98);
        opacity:.62;
      }
      50% {
        transform:
          translate3d(var(--x), var(--y), var(--z))
          translate(-50%, -50%)
          rotate(var(--r))
          scale(1.06);
        opacity:1;
      }
    }

    @keyframes shimmer{
      0%   { filter: brightness(1) saturate(1.1); }
      50%  { filter: brightness(1.18) saturate(1.25); }
      100% { filter: brightness(1) saturate(1.1); }
    }

    .vignette{
      position:fixed;
      inset:-2px;
      background: radial-gradient(circle at 50% 45%, transparent 40%, rgba(0,0,0,.55) 76%, rgba(0,0,0,.88) 100%);
      pointer-events:none;
    }
  </style>
</head>

<body>
  <div class="stage" aria-label="Coração neon com texto em movimento">
    <div class="spinWrap">
      <div class="floatInner">
        <div class="trail" id="trail"></div>
        <div class="heart" id="heart"></div>
      </div>
    </div>
  </div>
  <div class="vignette"></div>

  <script>
    const TEXT   = "I love you";
    const COUNT  = 190;   // mais = mais fechado e “perfeito”
    const SIZE   = 235;   // tamanho do coração
    const DEPTH  = 22;    // profundidade 3D
    const JITTER = 1.2;   // micro imperfeição bonita
    const TWIST  = 14;    // torção suave nas palavras

    const heart = document.getElementById("heart");
    const trail = document.getElementById("trail");
    const stage = document.querySelector(".stage");

    function heartPoint(t){
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
      return { x, y };
    }

    function render(){
      const rect = stage.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;

      function makeLayer(container, opacityMul){
        container.innerHTML = "";
        for(let i=0;i<COUNT;i++){
          const t = (i / COUNT) * Math.PI * 2;
          const p = heartPoint(t);

          let x = cx + (p.x * (SIZE/32));
          let y = cy - (p.y * (SIZE/32));

          x += Math.sin(i*1.7) * JITTER;
          y += Math.cos(i*1.3) * JITTER;

          const z = Math.sin(t*2) * DEPTH;

          const t2 = t + 0.001;
          const p2 = heartPoint(t2);
          const dx = (p2.x - p.x);
          const dy = (p2.y - p.y);
          const angle = Math.atan2(-dy, dx) * (180/Math.PI) + TWIST;

          const span = document.createElement("span");
          span.className = "love";
          span.textContent = TEXT;

          span.style.animationDelay = `${i * 12}ms`;

          const baseOpacity = 0.50 + 0.50 * Math.abs(Math.cos(t));
          span.style.opacity = String(Math.min(1, baseOpacity * opacityMul));

          span.style.setProperty("--x", `${x}px`);
          span.style.setProperty("--y", `${y}px`);
          span.style.setProperty("--z", `${z}px`);
          span.style.setProperty("--r", `${angle}deg`);

          container.appendChild(span);
        }
      }

      makeLayer(heart, 1);
      makeLayer(trail, 0.75);
    }

    render();
    window.addEventListener("resize", render);
  </script>
</body>
</html>
